name: Generate Snake
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Rajmund09
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

**6. Save it**
- Top right → click **`Commit changes`**
- File name should be `snake.yml` — GitHub auto-places it in `.github/workflows/`

---

**7. Run it manually (first time)**
- Go to **Actions tab** → click **`Generate Snake`** on the left
- Click **`Run workflow`** → **`Run workflow`** (green button)
- Wait ~30 seconds for it to finish ✅

---

**8. Done** — after it runs, the snake SVG will be live at:
```
https://raw.githubusercontent.com/Rajmund09/Rajmund09/output/github-contribution-grid-snake-dark.svg
